site_name: Agent Foundation
site_description: Specifications for secure, composable multi-agent systems
site_url: https://geronimo-iia.github.io/agent-foundation/
repo_url: https://github.com/geronimo-iia/agent-foundation
repo_name: geronimo-iia/agent-foundation

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Bootstrap: bootstrap/definition.md
  - Documentation: docs/definition.md
  - Skills: skills/definition.md
  - Agents: agents/definition.md
  - Tools: tools/definition.md
  - Information Flow: information-flow/definition.md
  - Rules: rules/definition.md
  - Schemas: schemas/README.md
  - Changelog: CHANGELOG.md
  - Contributing: CONTRIBUTING.md
  - License: LICENSE

copyright: Copyright &copy; 2026 Jerome Guibert