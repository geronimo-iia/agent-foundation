site_name: Agent Foundation
site_description: Specifications for secure, composable multi-agent systems
site_url: https://geronimo-iia.github.io/agent-foundation/
repo_url: https://github.com/geronimo-iia/agent-foundation
repo_name: geronimo-iia/agent-foundation

# Use mkdocs_temp as docs directory
docs_dir: mkdocs_temp

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - search.highlight
    - search.share
    - content.code.copy

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: README.md
  - Bootstrap:
    - Definition: bootstrap/definition.md
    - Development Environment: bootstrap/development-environment.md
  - Documentation:
    - Definition: docs/definition.md
    - Authoring Guide: docs/authoring-guide.md
    - Organization: docs/organization.md
    - Hub: docs/hub.md
    - Hub Configuration: docs/hub-configuration.md
  - Skills:
    - Definition: skills/definition.md
    - Authoring Guide: skills/authoring-guide.md
    - Hub: skills/hub.md
    - Lifecycle: skills/lifecycle.md
    - Lifecycle Format: skills/lifecycle-format.md
  - Agents:
    - Definition: agents/definition.md
    - Manifest Specification: agents/agent-manifest-specification.md
    - Manifest Registry: agents/agent-manifest-registry.md
  - Tools:
    - Definition: tools/definition.md
    - Execution Policy: tools/execution-policy.md
    - MCP Protocol: tools/mcp-protocol.md
  - Information Flow:
    - Definition: information-flow/definition.md
    - TSL Core: information-flow/tsl-core.md
    - Taint Supervisor: information-flow/taint-supervisor.md
    - Audit Events: information-flow/audit-events.md
  - Rules:
    - Definition: rules/definition.md
    - Best Practices: rules/best-practices.md
    - Workspace Implementation: rules/workspace-implementation.md
  - Schemas: schemas/README.md
  - Reference:
    - Changelog: CHANGELOG.md
    - Contributing: CONTRIBUTING.md
    - License: LICENSE.md

